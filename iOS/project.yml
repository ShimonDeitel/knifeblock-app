name: Knife Block
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Knife Block:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Knife Block
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.knifeblock
        INFOPLIST_FILE: Knife Block/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTS_MACCATALYST: NO
    info:
      path: Knife Block/Info.plist
      properties:
        CFBundleDisplayName: Knife Block
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
  Knife BlockTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Knife BlockTests
    dependencies:
      - target: Knife Block
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.knifeblock.tests
  Knife BlockUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Knife BlockUITests
    dependencies:
      - target: Knife Block
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.knifeblock.uitests
schemes:
  Knife Block:
    build:
      targets:
        Knife Block: all
    test:
      targets:
        - Knife BlockTests
        - Knife BlockUITests
    run:
      config: Debug
    archive:
      config: Release
